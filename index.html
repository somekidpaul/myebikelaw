        {
          "@type": "Question",
          "name": "What is NJ S4834?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "New Jersey Senate Bill S4834 (P.L.2025, c.285), signed by outgoing Governor Murphy on January 19, 2026. It updates how electric bicycles are regulated — defining three categories and assigning different combinations of license, registration, and insurance requirements to each. Compliance deadline is July 19, 2026."
          }
        },
        {
          "@type": "Question",
          "name": "Do all e-bikes need insurance under NJ S4834?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. The bill differentiates by category. Low-speed electric bicycles (pedal-assist, motor cuts at 20 mph) need license and registration but not insurance. Motorized bicycles (throttle, or 21-28 mph) need license, registration, and insurance. Electric motorized bicycles (>750W or >28 mph) are reclassified as motorcycles entirely."
          }
        },
        {
          "@type": "Question",
          "name": "What are the NJ S4834 liability insurance minimums?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "$35,000 bodily injury per person / $70,000 per accident / $25,000 property damage, plus PIP, for policies issued on or after January 1, 2026 (per N.J.S.A. 39:6B-1). These apply to motorized bicycles, not low-speed electric bicycles."
          }
        },
        {
          "@type": "Question",
          "name": "When is the NJ e-bike compliance deadline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "July 19, 2026. The bill took effect on January 19, 2026 with a six-month grace period. Registration and licensing fees are waived through January 19, 2027."
          }
        },
        {
          "@type": "Question",
          "name": "Does my homeowners or renters insurance cover my e-bike under NJ S4834?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Usually not. Most standard homeowners and renters policies have a motorized-vehicle exclusion that triggers as soon as a bike has a motor. Even when a rider or endorsement extends coverage, it rarely meets the statutory minimums. Verify with your carrier in writing before relying on it."
          }
        }
      ]
    }
